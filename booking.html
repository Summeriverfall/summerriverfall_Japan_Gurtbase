<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reserve at GurtBase — group visits, pre-order pickup, or general inquiries for self-serve frozen yogurt & açaí in Kyoto.">
  <title>Reservation — GurtBase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="booking-container">
    <a href="landing.html" class="booking-back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Home
    </a>

    <div class="booking-header">
      <div class="booking-badge">RESERVATION</div>
      <h1 class="booking-title">GurtBase</h1>
      <p class="booking-subtitle">Group visit, pre-order pickup, or general inquiry — we'll get back to you via WhatsApp.</p>
    </div>

    <div class="booking-card">
      <div class="success-message" id="successMessage">
        Your inquiry has been prepared. Opening WhatsApp shortly...
      </div>

      <form id="bookingForm">
        <div class="form-group" id="inquiryGroup">
          <label for="inquiryType" class="form-label">Inquiry Type *</label>
          <select id="inquiryType" name="inquiryType" class="form-select" required>
            <option value="">Select type</option>
            <option value="Group Visit">Group Visit — Let us know you're coming with friends</option>
            <option value="Pre-order Pickup">Pre-order Pickup — Order ahead and pick up</option>
            <option value="General Inquiry">General Inquiry — Ask us anything</option>
          </select>
          <div class="form-error">Please select an inquiry type</div>
        </div>

        <div class="form-group" id="nameGroup">
          <label for="name" class="form-label">Your Name *</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Enter your name" required>
          <div class="form-error">Please enter your name</div>
        </div>

        <div class="form-group" id="dateGroup">
          <label for="date" class="form-label">Preferred Date *</label>
          <input type="date" id="date" name="date" class="form-input" required>
          <div class="form-error">Please select a date</div>
        </div>

        <div class="form-group" id="timeGroup">
          <label for="time" class="form-label">Preferred Time *</label>
          <input type="time" id="time" name="time" class="form-input" required min="07:00" max="23:30">
          <div class="form-error">Please select a time</div>
        </div>

        <div class="form-group" id="guestsGroup">
          <label for="guests" class="form-label">Number of People</label>
          <select id="guests" name="guests" class="form-select">
            <option value="">Select (optional)</option>
            <option value="1">1 person</option>
            <option value="2">2 people</option>
            <option value="3">3 people</option>
            <option value="4">4 people</option>
            <option value="5">5 people</option>
            <option value="6-10">6–10 people</option>
            <option value="10+">10+ people</option>
          </select>
        </div>

        <div class="form-group" id="productGroup" style="display:none;">
          <label for="product" class="form-label">Product</label>
          <select id="product" name="product" class="form-select">
            <option value="">Any / Not decided</option>
            <optgroup label="Greek Yogurt 100g / グリークヨーグルト 100g">
              <option value="plain-100g">Plain / プレーン — ¥700</option>
              <option value="honey-100g">Honey / ハニー — ¥800</option>
              <option value="oreo-100g">Oreo / オレオ — ¥800</option>
              <option value="lotus-100g">Lotus / ロータス — ¥800</option>
            </optgroup>
            <optgroup label="Greek Yogurt 150g / グリークヨーグルト 150g">
              <option value="plain-150g">Plain / プレーン — ¥1,000</option>
              <option value="honey-150g">Honey / ハニー — ¥1,100</option>
              <option value="oreo-150g">Oreo / オレオ — ¥1,100</option>
              <option value="lotus-150g">Lotus / ロータス — ¥1,100</option>
            </optgroup>
            <optgroup label="Greek Yogurt Signature Sets / スペシャル">
              <option value="classic">Classic / 定番 — ¥1,900</option>
              <option value="choco-special">Chocolate Special / チョコスペシャル — ¥1,900</option>
              <option value="fruit-special">Fruit Special / フルーツスペシャル — ¥2,200</option>
            </optgroup>
            <optgroup label="Frozen Yogurt Ice / フローズンヨーグルトアイス">
              <option value="frozen-yogurt-200g">Frozen Yogurt Ice 200g — ¥1,300</option>
              <option value="frozen-yogurt-greek-200g">Frozen Yogurt Ice &amp; Greek 200g — ¥1,300</option>
              <option value="basic-frozen-yogurt">Basic Frozen Yogurt Ice — ¥2,100</option>
              <option value="basic-frozen-yogurt-greek">Basic Frozen Yogurt Ice &amp; Greek — ¥2,100</option>
            </optgroup>
            <optgroup label="Frozen Açaí / フローズンアサイー">
              <option value="acai-200g">Frozen Açaí 200g — ¥1,300</option>
              <option value="acai-greek-200g">Frozen Açaí &amp; Greek 200g — ¥1,300</option>
              <option value="basic-acai">Basic Frozen Açaí — ¥2,000</option>
              <option value="basic-acai-greek">Basic Frozen Açaí &amp; Greek — ¥2,000</option>
            </optgroup>
            <optgroup label="Vanilla Ice Cream / バニラアイス">
              <option value="vanilla-200g">Vanilla Ice Cream 200g — ¥1,300</option>
              <option value="vanilla-greek-200g">Vanilla Ice Cream &amp; Greek 200g — ¥1,300</option>
            </optgroup>
            <optgroup label="Salad / サラダ">
              <option value="salad-bowl">Greek Yogurt Salad Bowl — ¥1,300</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group" id="messageGroup">
          <label for="message" class="form-label">Message / Notes</label>
          <textarea id="message" name="message" class="form-input form-textarea" placeholder="Any special requests, dietary needs, questions..." rows="3"></textarea>
        </div>

        <button type="submit" class="booking-submit-btn" id="submitButton">
          <span class="whatsapp-icon">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.884-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          </span>
          <span>Send via WhatsApp</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    var WHATSAPP_NUMBER = '81757087077';

    // Dynamic field visibility based on inquiry type
    document.getElementById('inquiryType').addEventListener('change', function() {
      var type = this.value;
      document.getElementById('productGroup').style.display = (type === 'Pre-order Pickup') ? 'block' : 'none';
      document.getElementById('guestsGroup').style.display = (type === 'General Inquiry') ? 'none' : 'block';
    });

    // Min date = today
    var dateInput = document.getElementById('date');
    dateInput.setAttribute('min', new Date().toISOString().split('T')[0]);

    // Pre-select inquiry type and product from URL parameters
    (function() {
      var params = new URLSearchParams(window.location.search);
      var type = params.get('type');
      if (type) {
        var sel = document.getElementById('inquiryType');
        for (var i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === type) {
            sel.options[i].selected = true;
            sel.dispatchEvent(new Event('change'));
            break;
          }
        }
      }
      var product = params.get('product');
      if (product) {
        var psel = document.getElementById('product');
        for (var j = 0; j < psel.options.length; j++) {
          if (psel.options[j].value === product) {
            psel.options[j].selected = true;
            break;
          }
        }
      }
    })();

    function validateForm() {
      var isValid = true;
      document.querySelectorAll('.form-group').forEach(function(g) { g.classList.remove('error'); });
      var requiredFields = [
        { id: 'name', group: 'nameGroup' },
        { id: 'date', group: 'dateGroup' },
        { id: 'time', group: 'timeGroup' },
        { id: 'inquiryType', group: 'inquiryGroup' }
      ];
      requiredFields.forEach(function(f) {
        if (!document.getElementById(f.id).value.trim()) {
          document.getElementById(f.group).classList.add('error');
          isValid = false;
        }
      });
      return isValid;
    }

    function formatDate(dateString) {
      var date = new Date(dateString + 'T00:00:00');
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatTime(timeString) {
      var parts = timeString.split(':');
      var hour = parseInt(parts[0]);
      var ampm = hour >= 12 ? 'PM' : 'AM';
      var displayHour = hour % 12 || 12;
      return displayHour + ':' + parts[1] + ' ' + ampm;
    }

    function buildMessage(formData) {
      var type = formData.get('inquiryType');
      var name = formData.get('name');
      var date = formatDate(formData.get('date'));
      var time = formatTime(formData.get('time'));
      var guests = formData.get('guests');
      var productSelect = document.getElementById('product');
      var productText = productSelect.value ? productSelect.options[productSelect.selectedIndex].text : '';
      var msg = formData.get('message') || '';

      var text = 'Hello GurtBase! I have a ' + type + ' inquiry.\n\n';
      text += 'Name: ' + name + '\n';
      text += 'Date: ' + date + '\n';
      text += 'Time: ' + time + '\n';
      if (guests && guests.trim()) text += 'People: ' + guests + '\n';
      if (type === 'Pre-order Pickup' && productText) {
        text += 'Product: ' + productText + '\n';
      }
      if (msg && msg.trim()) text += '\nMessage: ' + msg + '\n';
      return encodeURIComponent(text);
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!validateForm()) return;

      var formData = new FormData(this);
      var whatsappUrl = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + buildMessage(formData);

      var successMessage = document.getElementById('successMessage');
      var submitButton = document.getElementById('submitButton');

      successMessage.classList.add('show');
      submitButton.disabled = true;
      submitButton.querySelector('span:last-child').textContent = 'Redirecting...';

      setTimeout(function() {
        window.open(whatsappUrl, '_blank');
      }, 500);
    });

    // Live validation on blur/input
    document.querySelectorAll('.form-input, .form-select, .form-textarea').forEach(function(input) {
      input.addEventListener('blur', function() {
        var group = this.closest('.form-group');
        if (this.hasAttribute('required') && !this.value.trim()) {
          group.classList.add('error');
        } else {
          group.classList.remove('error');
        }
      });
      input.addEventListener('input', function() {
        var group = this.closest('.form-group');
        if (group.classList.contains('error') && this.value.trim()) {
          group.classList.remove('error');
        }
      });
    });
  </script>
</body>
</html>
